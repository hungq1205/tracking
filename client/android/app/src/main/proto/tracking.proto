syntax = "proto3";

package tracking;

service TrackingService {
  rpc DetectObject (DetectionRequest) returns (DetectionResponse);
  rpc GetEmbedding (EmbeddingRequest) returns (EmbeddingResponse);
  rpc Chat (ChatRequest) returns (ChatResponse);
  rpc VoiceChat (VoiceChatRequest) returns (ChatResponse);
  rpc StreamFrame (FrameRequest) returns (FrameResponse);
  rpc VoiceChatStream (stream VoiceChatChunk) returns (stream AudioChunk);
}

message DetectionRequest {
  string prompt = 1;
}

message DetectionResponse {
  repeated float box_xyxy = 1;
  float score = 2;
}

message EmbeddingRequest {
  repeated float box_xyxy = 1;
}

message EmbeddingResponse {
  repeated float embedding = 1;
}

message ChatRequest {
  string message = 1;
}

message ChatResponse {
  string response = 1;
  bytes audio_response = 2;
  string agent_name = 3;
  string agent_state = 4;
  string agent_payload = 5;
}

message VoiceChatRequest {
  bytes audio_data = 1;
}

// IMU measurement from the device (accelerometer + gyroscope).
// timestamp_ns uses the same hardware clock as camera frame timestamps.
message IMUFrame {
  int64 timestamp_ns = 1;
  float accel_x = 2;
  float accel_y = 3;
  float accel_z = 4;
  float gyro_x = 5;
  float gyro_y = 6;
  float gyro_z = 7;
}

// Multiplexed stream sent by client while PTT button is held.
message VoiceChatChunk {
  oneof payload {
    bytes audio_chunk = 1;  // raw PCM 16-bit LE, 16 kHz mono
    bytes video_frame = 2;  // JPEG-encoded camera frame
    IMUFrame imu_frame = 3; // IMU measurement (accelerometer + gyroscope)
  }
}

// Single raw-PCM chunk streamed back by the server (24 kHz, 16-bit LE, mono).
message AudioChunk {
  bytes pcm_data = 1;
}

message FrameRequest {
  bytes image_data = 1;
}

message FrameResponse {
  bool success = 1;
  bytes audio_response = 2;
}

message GuidanceFrameResponse {
  bool success = 1;
  string instruction = 2;
  string tracking_status = 3;
  float object_confidence = 4;
  repeated float object_box_xyxy = 5;
  repeated float hand_box_xyxy = 6;
  float delta_x = 7;
  float delta_y = 8;
  float distance_px = 9;
}

service MediatorService {
  rpc StreamFrameWithGuidance (FrameRequest) returns (GuidanceFrameResponse);
  rpc Chat (ChatRequest) returns (ChatResponse);
  rpc VoiceChat (VoiceChatRequest) returns (ChatResponse);
}

// ── Map service ────────────────────────────────────────────────────────────

service MapService {
  rpc ListMaps (ListMapsRequest) returns (ListMapsResponse);
  rpc GetMapGeometry (GetMapRequest) returns (stream MapGeometryChunk);
  rpc ScanFrame (ScanFrameRequest) returns (ScanFrameResponse);
  rpc SetZoneLabel (SetZoneLabelRequest) returns (SetZoneLabelResponse);
  rpc ExportScanMap (ExportScanMapRequest) returns (ExportScanMapResponse);
}

message ListMapsRequest {}

message ListMapsResponse {
  repeated string location_ids = 1;
}

message GetMapRequest {
  string location_id = 1;
}

message ZoneMetadata {
  string label = 1;
  repeated float bbox_min = 2;
  repeated float bbox_max = 3;
}

message MapMetadata {
  string location_id = 1;
  string created_at = 2;
  int32 point_count = 3;
  repeated ZoneMetadata zones = 4;
}

message MapGeometryChunk {
  bytes data = 1;
}

message ScanFrameRequest {
  bytes image_data = 1;
  string location_id = 2;
  string zone_label = 3;   // optional: if non-empty, create a zone at the current camera pos
  float zone_radius = 4;   // zone half-extent in metres; 0 → server default (1.5 m)
}

message ScanFrameResponse {
  bool success = 1;
  int32 point_count = 2;
  repeated float camera_position = 3;
}

message SetZoneLabelRequest {
  string location_id = 1;
  string label = 2;
  float radius = 3;
}

message SetZoneLabelResponse {
  bool success = 1;
  string message = 2;
}

message ExportScanMapRequest {
  string location_id = 1;
}

message ExportScanMapResponse {
  bool success = 1;
  string output_path = 2;
  int32 point_count = 3;
  int32 zone_count = 4;
}